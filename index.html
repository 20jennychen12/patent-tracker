<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Patent Watch | Structural Adhesives AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc, #eff6ff);
        }

        h1,
        h2,
        h3,
        .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .patent-card {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .patent-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }

        .tech-pill {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-glow);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="text-slate-900 min-h-screen">
    <div class="glow top-0 right-0"></div>
    <div class="glow bottom-0 left-0" style="background: rgba(16, 185, 129, 0.1)"></div>

    <!-- 顶部导航 -->
    <nav class="sticky top-0 z-50 glass-card border-b border-slate-200/50 px-6 h-20 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div
                class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">ADHV-PRO <span
                        class="text-indigo-600 font-light">WATCH</span></h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Structural Adhesive AI
                    Intelligence</p>
            </div>
        </div>

        <div class="hidden md:flex items-center space-x-6">
            <div class="flex flex-col items-end">
                <span class="text-xs font-bold text-slate-400 uppercase">Status</span>
                <span class="text-sm font-semibold flex items-center text-emerald-600">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mr-2"></span>
                    Gemini 1.5 Pro Live
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- 统计/横向信息栏 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-sm font-semibold text-slate-500 mb-1">Total Monitored</p>
                <div class="flex items-end space-x-2">
                    <span id="statTotal" class="text-3xl font-bold">50</span>
                    <span class="text-emerald-500 text-sm font-bold pb-1">Patents</span>
                </div>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-sm font-semibold text-slate-500 mb-1">Target Sector</p>
                <div class="flex items-end space-x-2">
                    <span class="text-3xl font-bold">Structural</span>
                    <span class="text-slate-400 text-sm font-bold pb-1">1K Epoxy</span>
                </div>
            </div>
            <div class="glass-card p-6 rounded-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-sm font-semibold text-slate-500 mb-1">Search & Filter</p>
                    <input type="text" id="searchInput" placeholder="Keywords (e.g. peel, cure)..."
                        class="w-full bg-slate-100/50 border-0 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all">
                </div>
            </div>
        </div>

        <!-- 列表标题 -->
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold flex items-center">
                Deep Analysis Feed
                <span
                    class="ml-3 px-2 py-1 bg-indigo-100 text-indigo-600 text-[10px] rounded-md font-black uppercase">Technical
                    Edge</span>
            </h2>
        </div>

        <!-- 卡片容器 -->
        <div id="patentsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Loading -->
            <div id="loadingState" class="col-span-full py-24 flex flex-col items-center justify-center">
                <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-4 font-semibold text-slate-400">Synthesizing Pro Analysis Data...</p>
            </div>
        </div>

        <!-- Empty -->
        <div id="emptyState" class="hidden glass-card p-12 rounded-3xl text-center">
            <p class="text-slate-400 font-medium">No matching technologies identified in current feed.</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('patentsContainer');
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const searchInput = document.getElementById('searchInput');
            let allPatents = [];

            fetch('data/patents.json')
                .then(res => res.json())
                .then(data => {
                    allPatents = data;
                    document.getElementById('statTotal').textContent = data.length;

                    allPatents.sort((a, b) => new Date(b.publication_date) - new Date(a.publication_date));

                    loadingState.classList.add('hidden');
                    renderPatents(allPatents);
                })
                .catch(err => {
                    loadingState.innerHTML = `<div class="p-8 glass-card border-red-100 text-red-500 rounded-2xl">
                        <p class="font-bold">Data Feed Missing</p>
                        <p class="text-sm">Please run "python main.py" to generate Pro analysis results.</p>
                    </div>`;
                });

            function renderPatents(patents) {
                container.innerHTML = '';
                if (patents.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                emptyState.classList.add('hidden');

                patents.forEach(p => {
                    const card = document.createElement('div');
                    card.className = "patent-card glass-card rounded-3xl overflow-hidden flex flex-col";

                    const isNew = new Date() - new Date(p.publication_date) < 7 * 24 * 60 * 60 * 1000;

                    card.innerHTML = `
                        <div class="p-8 pb-4">
                            <div class="flex justify-between items-start mb-6">
                                <span class="bg-indigo-50 text-indigo-700 text-[10px] font-black px-3 py-1 rounded-lg tracking-wider">
                                    ${p.patent_number}
                                </span>
                                ${isNew ? '<span class="text-[10px] font-black text-amber-500 uppercase flex items-center"><span class="w-1.5 h-1.5 bg-amber-500 rounded-full mr-1"></span> New Target</span>' : ''}
                            </div>
                            
                            <h3 class="text-xl font-bold mb-3 leading-tight text-slate-900 group-hover:text-indigo-600 transition-colors">
                                ${p.title}
                            </h3>
                            
                            <div class="flex items-center space-x-4 text-[11px] font-bold text-slate-400 uppercase mb-8">
                                <span class="flex items-center"><svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>${p.assignee}</span>
                                <span class="flex items-center"><svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>${p.publication_date}</span>
                            </div>

                            <!-- Pro Technical Edge Section -->
                            <div class="bg-slate-900 text-white rounded-2xl p-6 mb-6 shadow-xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-4 opacity-10">
                                    <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                </div>
                                <h4 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 flex items-center">
                                    Technical Edge (Pro Analysis)
                                </h4>
                                <p class="text-sm font-medium leading-relaxed text-indigo-50">
                                    ${p.improvements || 'Analyzing core improvements...'}
                                </p>
                            </div>

                            <div class="mb-6">
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Scientific Summary</h4>
                                <p class="text-sm text-slate-600 leading-relaxed line-clamp-4">
                                    ${p.summary || 'Summary pending...'}
                                </p>
                            </div>
                        </div>

                        <div class="mt-auto p-4 px-8 bg-slate-50/50 flex justify-between items-center border-t border-slate-100">
                             <a href="https://patents.google.com/patent/${p.patent_number}" target="_blank" 
                                class="text-indigo-600 text-xs font-black uppercase tracking-wider flex items-center group">
                                Raw Document
                                <svg class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                             </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allPatents.filter(p =>
                    p.title.toLowerCase().includes(term) ||
                    (p.summary && p.summary.toLowerCase().includes(term)) ||
                    p.assignee.toLowerCase().includes(term)
                );
                renderPatents(filtered);
            });
        });
    </script>
</body>

</html>
